<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Spotify Clone</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon" />
    
  </head>
  <body>
    <div class="container">
      <div class="left">
        <div class="ltop">
          <img src="logo.svg" alt="Spotify Logo" />
          <div class="home">
            <img src="homeicon.svg" alt="homeicon" />
            <p>Home</p>
          </div>
          <div class="search">
            <img src="searchicon.svg" alt="searchicon" />
            <p>Search</p>
          </div>
        </div>
        <div class="lbottom">
          <div class="library">
            <img src="libraryicon.svg" alt="libraryicon" />
            <p>Your library</p>
          </div>
          <div class="songsbar">
            <!-- <div class="songdiv">
              <img src="music.svg" alt="music" />
              <p>Abroad Again - Jeremy Blake.mp3 Harry</p>
              <img src="play.svg" alt="play" />
            </div> -->

          </div>
          <div class="info">
            <a href="">Legal</a>
            <a href="">Privacy Center</a>
            <a href="">Privacy Policy</a>
            <a href="">Cookies</a>
            <a href="">About Ads</a>
            <a href="">Accessibility</a>
            <a href=""></a>
          </div>
        </div>
      </div>
      <div class="right">
        <div class="nav">
          <div class="arrows">
            <img src="leftarrow.svg" alt="leftarrow" />
            <img src="rightarrow.svg" alt="rightarrow" />
          </div>
          <div class="navbuttons">
            <p>Sign up</p>
            <button>Log in</button>
          </div>
        </div>
        <h1>Spotify Playlists</h1>

        <div class="play">
          <div class="abovebar">

            <div id="songname">
              
            </div>
            <div class="playicons">
              <img id="prevbutton" src="prevsong.svg" alt="prevsong" />
              <img id="playbutton" src="play.svg" alt="play" />
              <img id="nextbutton" src="nextsong.svg" alt="nextsong" />
            </div>
            <div id="duration">
              00 / 00
            </div>

          </div>

          <div class="belowbar">
            <div class="circle"></div>
            <div class="seekbar"></div>
          </div>
        </div>
      </div>
    </div>

    <script src="main.js"></script>
  </body>
</html>
